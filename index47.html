<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Yeadim High School</title>
    <style>
        :root {
            --sidebar-width: 260px;
            --accent-color: #00ffff;
            --heart-color: #ff3e3e;
            --player-glow: rgba(255, 255, 255, 0.8);
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #0a0a0a; font-family: 'Segoe UI', system-ui, sans-serif; 
        }

        #lobby {
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #222, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .corridor-title { color: white; font-size: 3.5rem; margin-bottom: 20px; text-shadow: 0 0 20px var(--accent-color); font-weight: 900; }

        .plot-description {
            color: #ccc;
            font-size: 1.2rem;
            max-width: 800px;
            margin-bottom: 30px;
            text-align: center;
            font-style: italic;
            direction: ltr;
        }

        .doors-container {
            display: flex; flex-direction: row; overflow-x: auto; width: 95%; padding: 40px; gap: 40px;
        }

        .door {
            flex: 0 0 180px; height: 310px; background: linear-gradient(145deg, #5d4037, #3e2723); 
            border: 4px solid #2e1b0e; border-radius: 15px 15px 5px 5px;
            position: relative; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; padding-top: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .door:hover { transform: translateY(-15px) scale(1.05); border-color: var(--accent-color); box-shadow: 0 0 30px rgba(0,255,255,0.3); }
        .poster { width: 120px; height: 150px; border: 3px solid #fff; object-fit: cover; border-radius: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .door-label { color: #fff; margin-top: 20px; font-weight: bold; font-size: 1.3rem; letter-spacing: 1px; }

        #gameWrapper { display: none; width: 100%; height: 100%; flex-direction: row; }
        #gameArea { flex-grow: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        #sidebar {
            width: var(--sidebar-width); background: #111; border-left: 2px solid #333;
            display: flex; flex-direction: column; align-items: center; padding: 25px; box-sizing: border-box;
        }

        .stat-box { width: 100%; background: #1a1a1a; padding: 15px; margin-bottom: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-label { font-size: 0.85rem; color: #777; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--accent-color); text-shadow: 0 0 10px rgba(0,255,255,0.5); }

        .back-btn { background: linear-gradient(to bottom, #ff5252, #b71c1c); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        #bonusMessage { position: absolute; top: 40px; color: #00ff00; font-size: 2.5rem; font-weight: 900; text-shadow: 0 0 20px #000; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1 class="corridor-title">Yeadim High School</h1>
        <p class="plot-description">
            The school day has ended, but a digital anomaly has trapped the faculty inside the mainframe! 
            Navigate the corridors, capture the territory, and stabilize the system to save Yeadim High School.
        </p>
        <div class="doors-container" id="doorsContainer"></div>
    </div>

    <div id="gameWrapper">
        <div id="gameArea">
            <div id="bonusMessage"></div>
            <canvas id="gameCanvas"></canvas>
        </div>
        <aside id="sidebar">
            <button class="back-btn" onclick="exitToLobby()">Back to Lobby (ESC)</button>
            <div class="stat-box"><div class="stat-label">Instructor</div><div id="levelTitle" class="stat-value"></div></div>
            <div class="stat-box"><div class="stat-label">Lives</div><div id="livesText" class="stat-value" style="color: var(--heart-color);">5</div></div>
            <div class="stat-box"><div class="stat-label">Progress</div><div id="percentText" class="stat-value">0%</div></div>
        </aside>
    </div>

    <script>
        // ëàï îùåáõ ëì ä-Script äî÷åøé îúåê ax44.html ììà ùéðåé
        const levels = [
            { id: 0, name: "Ilan", img: 'ilan.jpeg', difficulty: 1, type: 'chip' },
            { id: 1, name: "Asaf", img: 'asaf.jpeg', difficulty: 1, type: 'paper' },
            { id: 2, name: "Oved", img: 'oved.jpeg', difficulty: 2, type: 'speaker' },
            { id: 3, name: "Eviatar", img: 'eviatar.jpeg', difficulty: 2, type: 'camera' },
            { id: 4, name: "Daniel", img: 'daniel.jpeg', difficulty: 2, type: 'book' },
            { id: 5, name: "Sabag", img: 'sabag.jpeg', difficulty: 3, type: 'plane' },
            { id: 6, name: "Alexander", img: 'alexander.jpeg', difficulty: 2, type: 'history-book' }
        ];

        const alexanderJokes = [
            "To be or not to be?",
            "History repeats itself!",
            "Want to hear a joke?",
            "Henry VIII had six wives!",
            "A rabbi walks into a bar...",
            "Check your grammar!",
            "Shakespeare was here!"
        ];

        let completedLevels = new Set();
        let currentLevel = null;
        let gameActive = false;
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const TILE = 22, COLS = 35, ROWS = 25;
        
        let grid = [], player, enemies, bonuses, bgImage, lives = 5, percent = 0, lastUpdate = 0;
        let jokeTimer = 0, currentJoke = "", showJoke = false;

        function buildCorridor() {
            const container = document.getElementById('doorsContainer');
            container.innerHTML = '';
            levels.forEach(lvl => {
                const door = document.createElement('div');
                door.className = 'door';
                door.onclick = () => startLevel(lvl.id);
                door.innerHTML = `
                    <img src="${lvl.img}" class="poster" onerror="this.src='https://via.placeholder.com/120x150?text=Teacher'">
                    <div class="door-label">${lvl.name}</div>
                `;
                container.appendChild(door);
            });
        }

        function startLevel(levelId) {
            currentLevel = levels.find(l => l.id === levelId);
            gameActive = true;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('gameWrapper').style.display = 'flex';
            document.getElementById('levelTitle').innerText = currentLevel.name;
            canvas.width = COLS * TILE; canvas.height = ROWS * TILE;
            bgImage = new Image(); bgImage.src = currentLevel.img;
            bgImage.onload = initGame;
        }

        function initGame() {
            grid = Array(COLS).fill().map((_, x) => Array(ROWS).fill(0).map((_, y) => (x===0 || x===COLS-1 || y===0 || y===ROWS-1) ? 1 : 0));
            player = { x: 0, y: 0, drawing: false, speed: 1, dirX: 0, dirY: 0, pulse: 0 };
            enemies = []; bonuses = []; lives = 5; percent = 0;
            const enemyCount = currentLevel.difficulty + 1;
            for(let i=0; i<enemyCount; i++) enemies.push({ x: Math.floor(COLS/2), y: Math.floor(ROWS/2), dx: 1, dy: 1, frozen: false, anim: 0 });
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        function drawPlayer() {
            const px = player.x * TILE + TILE / 2;
            const py = player.y * TILE + TILE / 2;
            player.pulse += 0.1;
            const pulseSize = Math.sin(player.pulse) * 3;

            ctx.save();
            ctx.shadowBlur = 15 + pulseSize;
            ctx.shadowColor = "#fff";
            
            const grad = ctx.createRadialGradient(px, py, 2, px, py, TILE/2);
            grad.addColorStop(0, "#fff");
            grad.addColorStop(0.5, varProp('--accent-color'));
            grad.addColorStop(1, "#006666");
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(px, py, TILE/2 - 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#000";
            let eyeOffsetX = player.dirX * 3;
            let eyeOffsetY = player.dirY * 3;
            ctx.beginPath();
            ctx.arc(px + eyeOffsetX - 3, py + eyeOffsetY - 2, 2, 0, Math.PI*2);
            ctx.arc(px + eyeOffsetX + 3, py + eyeOffsetY - 2, 2, 0, Math.PI*2);
            ctx.fill();
            
            ctx.restore();
        }

        function drawEnemy(e) {
            ctx.save();
            ctx.translate(e.x * TILE + TILE / 2, e.y * TILE + TILE / 2);
            e.anim += 0.15;
            
            if(e.frozen) {
                ctx.strokeStyle = "cyan"; ctx.lineWidth = 2;
                ctx.strokeRect(-TILE/2, -TILE/2, TILE, TILE);
                ctx.globalAlpha = 0.6;
            }

            ctx.shadowBlur = 12;
            ctx.shadowColor = e.frozen ? "cyan" : "red";

            switch(currentLevel.type) {
                case 'chip':
                    ctx.fillStyle = "#2ecc71"; ctx.fillRect(-8, -8, 16, 16);
                    ctx.fillStyle = "#111"; ctx.fillRect(-4, -4, 8, 8);
                    ctx.fillStyle = "gold";
                    for(let i=-10; i<=6; i+=4) { 
                        ctx.fillRect(i, -11, 2, 3); ctx.fillRect(i, 8, 2, 3); 
                        ctx.fillRect(-11, i, 3, 2); ctx.fillRect(8, i, 3, 2); 
                    }
                    break;
                case 'paper':
                    ctx.fillStyle = "#fff"; ctx.rotate(Math.sin(e.anim)*0.1);
                    ctx.fillRect(-7, -10, 14, 20);
                    ctx.strokeStyle = "#333"; ctx.lineWidth = 1;
                    for(let i=-6; i<6; i+=4) { ctx.beginPath(); ctx.moveTo(-4, i); ctx.lineTo(4, i); ctx.stroke(); }
                    ctx.fillStyle = "red"; ctx.font = "bold 8px Arial"; ctx.fillText("100", -5, 8);
                    break;
                case 'speaker':
                    const bass = Math.abs(Math.sin(e.anim)) * 3;
                    ctx.fillStyle = "#222"; ctx.fillRect(-9, -10, 18, 20);
                    ctx.fillStyle = "#444"; ctx.beginPath(); ctx.arc(0, 4, 6 + bass/2, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = varProp('--accent-color'); ctx.stroke();
                    ctx.fillStyle = "#666"; ctx.beginPath(); ctx.arc(0, -5, 3, 0, Math.PI*2); ctx.fill();
                    break;
                case 'camera':
                    ctx.fillStyle = "#333"; ctx.fillRect(-10, -6, 15, 12);
                    ctx.fillStyle = "#555"; ctx.fillRect(5, -4, 6, 8);
                    const lensGrad = ctx.createRadialGradient(8, 0, 1, 8, 0, 3);
                    lensGrad.addColorStop(0, "cyan"); lensGrad.addColorStop(1, "blue");
                    ctx.fillStyle = lensGrad; ctx.beginPath(); ctx.arc(8, 0, 3, 0, Math.PI*2); ctx.fill();
                    break;
                case 'book':
                    ctx.fillStyle = "#f4e4bc"; ctx.fillRect(-9, -9, 18, 18);
                    ctx.strokeStyle = "#5d4037"; ctx.lineWidth = 2; ctx.strokeRect(-9, -9, 18, 18);
                    ctx.beginPath(); ctx.moveTo(0, -9); ctx.lineTo(0, 9); ctx.stroke();
                    break;
                case 'plane':
                    ctx.rotate(Math.atan2(e.dy, e.dx) + Math.PI/2);
                    ctx.fillStyle = "#78909c";
                    ctx.beginPath(); ctx.moveTo(0, -12); ctx.lineTo(10, 10); ctx.lineTo(0, 5); ctx.lineTo(-10, 10); ctx.closePath(); ctx.fill();
                    ctx.fillStyle = "orange"; if(Math.random() > 0.5) ctx.fillRect(-3, 6, 6, 4);
                    break;
                case 'history-book':
                    ctx.fillStyle = "#8b4513"; ctx.fillRect(-10, -12, 20, 24);
                    ctx.fillStyle = "#f4e4bc"; ctx.fillRect(-8, -10, 16, 20);
                    ctx.fillStyle = "gold";
                    ctx.beginPath(); ctx.moveTo(-5, -12); ctx.lineTo(-5, -17); ctx.lineTo(-2, -14); ctx.lineTo(0, -17); ctx.lineTo(2, -14); ctx.lineTo(5, -17); ctx.lineTo(5, -12); ctx.fill();
                    ctx.fillStyle = "#000"; ctx.font = "bold 6px Arial"; ctx.fillText("ABC", -6, 5);

                    jokeTimer++;
                    if (jokeTimer > 150) {
                        if (!showJoke && Math.random() < 0.05) {
                            currentJoke = alexanderJokes[Math.floor(Math.random() * alexanderJokes.length)];
                            showJoke = true;
                            setTimeout(() => { showJoke = false; }, 3500);
                            jokeTimer = 0;
                        }
                    }
                    if (showJoke) {
                        ctx.save(); ctx.translate(0, -30);
                        ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 1;
                        ctx.beginPath(); 
                        if (ctx.roundRect) ctx.roundRect(-45, -15, 90, 22, 8); else ctx.rect(-45, -15, 90, 22);
                        ctx.fill(); ctx.stroke();
                        ctx.fillStyle = "black"; ctx.font = "bold 9px Arial"; ctx.textAlign = "center";
                        ctx.fillText(currentJoke, 0, 0);
                        ctx.restore();
                    }
                    break;
            }
            ctx.restore();
        }

        function varProp(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        window.addEventListener("keydown", (e) => {
            if (e.key === "Escape") exitToLobby();
            if (!gameActive) return;
            if (e.key === " ") player.drawing = true;
            
            let nx = player.x, ny = player.y;
            player.dirX = 0; player.dirY = 0;

            if(e.key === "ArrowUp") { ny--; player.dirY = -1; }
            if(e.key === "ArrowDown") { ny++; player.dirY = 1; }
            if(e.key === "ArrowLeft") { nx--; player.dirX = -1; }
            if(e.key === "ArrowRight") { nx++; player.dirX = 1; }

            if(nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
                if(player.drawing && grid[nx][ny] === 2) { handleDeath(); return; }
                if(player.drawing && grid[nx][ny] === 0) grid[nx][ny] = 2;
                player.x = nx; player.y = ny;
                
                bonuses = bonuses.filter(b => {
                    if(b.x === player.x && b.y === player.y) { applyBonus(b.type); return false; }
                    return true;
                });
                if(player.drawing && grid[nx][ny] === 1) { fillArea(); player.drawing = false; }
            }
        });

        function fillArea() {
            for(let x=0; x<COLS; x++) for(let y=0; y<ROWS; y++) if(grid[x][y] === 2) grid[x][y] = 1;
            let checkGrid = Array(COLS).fill().map(() => Array(ROWS).fill(false));
            enemies.forEach(e => {
                let stack = [[e.x, e.y]];
                while(stack.length > 0) {
                    let [cx, cy] = stack.pop();
                    if(cx<0 || cx>=COLS || cy<0 || cy>=ROWS || grid[cx][cy]!==0 || checkGrid[cx][cy]) continue;
                    checkGrid[cx][cy] = true;
                    stack.push([cx+1, cy], [cx-1, cy], [cx, cy+1], [cx, cy-1]);
                }
            });
            for(let x=0; x<COLS; x++) for(let y=0; y<ROWS; y++) if(grid[x][y] === 0 && !checkGrid[x][y]) grid[x][y] = 1;
            if(Math.random() < 0.4) spawnBonus();
            calculatePercent();
        }

        function spawnBonus() {
            let bx, by; do { bx = Math.floor(Math.random()*COLS); by = Math.floor(Math.random()*ROWS); } while(grid[bx][by] !== 0);
            const types = ['FREEZE', 'SPEED', 'LIFE'];
            bonuses.push({ x: bx, y: by, type: types[Math.floor(Math.random()*types.length)] });
        }

        function draw() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let x=0; x<COLS; x++) {
                for(let y=0; y<ROWS; y++) {
                    if(grid[x][y] === 1) {
                        ctx.drawImage(bgImage, (x/COLS)*bgImage.width, (y/ROWS)*bgImage.height, bgImage.width/COLS, bgImage.height/ROWS, x*TILE, y*TILE, TILE, TILE);
                    } else if(grid[x][y] === 2) {
                        ctx.fillStyle = "rgba(255, 0, 0, 0.6)"; ctx.fillRect(x*TILE+1, y*TILE+1, TILE-2, TILE-2);
                    }
                }
            }
            bonuses.forEach(b => {
                ctx.fillStyle = b.type === 'LIFE' ? '#ff3e3e' : '#00ffff';
                ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath(); ctx.arc(b.x*TILE+TILE/2, b.y*TILE+TILE/2, TILE/3, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            });
            enemies.forEach(e => drawEnemy(e));
            drawPlayer();
        }

        function gameLoop(ts) {
            if(gameActive && ts - lastUpdate > 110) {
                enemies.forEach(e => {
                    if(e.frozen) return;
                    let nx = e.x + e.dx, ny = e.y + e.dy;
                    if(nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS || grid[nx][ny] === 1) {
                        if (Math.random() > 0.5) e.dx *= -1; else e.dy *= -1;
                    } else { e.x = nx; e.y = ny; }
                    if(grid[e.x][e.y] === 2 || (e.x === player.x && e.y === player.y)) handleDeath();
                });
                lastUpdate = ts;
            }
            draw();
            if(gameActive) requestAnimationFrame(gameLoop);
        }

        function applyBonus(type) {
            const msg = document.getElementById('bonusMessage');
            if (type === 'FREEZE') { 
                enemies.forEach(e => e.frozen = true); 
                msg.innerText = "TIME FREEZE!"; 
                setTimeout(() => { enemies.forEach(e => e.frozen = false); msg.innerText = ""; }, 5000); 
            } else if (type === 'SPEED') { 
                player.speed = 2; 
                msg.innerText = "SPEED UP!"; 
                setTimeout(() => { player.speed = 1; msg.innerText = ""; }, 7000); 
            } else if (type === 'LIFE') { 
                lives++; updateUI(); 
                msg.innerText = "+1 LIFE"; 
                setTimeout(() => { msg.innerText = ""; }, 3000); 
            }
        }

        function calculatePercent() {
            let f = 0; for(let x=0; x<COLS; x++) for(let y=0; y<ROWS; y++) if(grid[x][y] === 1) f++;
            percent = Math.floor((f / (COLS*ROWS)) * 100);
            updateUI();
            if(percent >= 80) { alert("STAGE CLEAR!"); exitToLobby(); }
        }

        function handleDeath() {
            lives--; updateUI();
            if(lives <= 0) { alert("GAME OVER"); exitToLobby(); }
            else { 
                player.x = 0; player.y = 0; player.drawing = false; 
                for(let x=0; x<COLS; x++) for(let y=0; y<ROWS; y++) if(grid[x][y] == 2) grid[x][y] = 0; 
            }
        }

        function updateUI() { document.getElementById('livesText').innerText = lives; document.getElementById('percentText').innerText = percent + "%"; }
        function exitToLobby() { gameActive = false; document.getElementById('lobby').style.display = 'flex'; document.getElementById('gameWrapper').style.display = 'none'; buildCorridor(); }

        buildCorridor();
    </script>
</body>
</html>
